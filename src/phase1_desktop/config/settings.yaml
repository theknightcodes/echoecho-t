# EchoEcho-T Phase 1 — Desktop Prototype Configuration

audio:
  sample_rate: 16000
  block_size: 512        # ~32ms at 16kHz
  channels: 1            # Mono
  dtype: float32

vad:
  model: silero_vad
  threshold: 0.3
  min_speech_duration_ms: 500
  speech_pad_ms: 300
  ring_buffer_samples: 512

stt:
  model: tiny
  device: cpu
  compute_type: int8
  beam_size: 5
  language: en           # Force English to reduce misdetection
  condition_on_previous_text: false
  vad_filter: true
  vad_parameters:
    threshold: 0.3
    min_speech_duration_ms: 500
    max_speech_duration_s: 30

translation:
  model: facebook/nllb-200-distilled-600M
  source_lang: eng_Latn
  target_lang: deu_Latn
  max_length: 128
  torch_dtype: float16

tts:
  # Phase 1: Use system TTS via pyttsx3
  # Phase 2+: Switch to Piper TTS
  engine: pyttsx3
  rate: 150              # Words per minute
  volume: 0.9
  sanitize_unicode_punctuation: true
  cooldown_seconds: 3    # Post-TTS mic mute to prevent feedback loop

pipeline:
  queue_size: 10
  stage_timeout: 30      # Seconds per stage

logging:
  latency_log: logs/latency.csv
  level: INFO
