name: echoecho_t_audio
description: EchoEcho-T Phase 0 — Simple Audio Recorder (Flutter)
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Audio recording
  record: ^5.1.2
  # Audio playback
  audioplayers: ^6.0.0
  # State management
  flutter_riverpod: ^2.5.1
  # Permissions
  permission_handler: ^11.3.1
  # Path for saving files
  path_provider: ^2.1.3
  # File picker
  file_picker: ^8.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
